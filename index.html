<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 IB 2027 Adaptive Test-Prep Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: linear-gradient(135deg,#1e3c72 0%,#2a5298 100%); color: white; padding: 30px; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .tabs { display: flex; background: #f8f9fa; border-bottom: 2px solid #e9ecef; }
        .tab { flex: 1; padding: 20px; text-align: center; cursor: pointer; font-weight: 600; transition: all 0.3s; border-bottom: 3px solid transparent; }
        .tab.active { background: white; border-bottom-color: #667eea; color: #667eea; }
        .tab-content { display: none; padding: 40px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #2c3e50; }
        input[type=range] { width: 100%; height: 8px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 25px; width: 25px; border-radius: 50%; background: #667eea; cursor: pointer; }
        .score-display { font-size: 1.8em; font-weight: bold; color: #27ae60; text-align: center; margin: 20px 0; }
        .metric { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; font-size: 1.3em; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #2c3e50; }
        tr:hover { background: #f8f9ff; }
        .error { background: #fee; color: #c33; padding: 15px; border-radius: 8px; border-left: 5px solid #f66; margin: 10px 0; }
        .roi-high { background: linear-gradient(135deg,#27ae60,#2ecc71); color: white; }
        .roi-low { background: linear-gradient(135deg,#e74c3c,#c0392b); color: white; }
        button { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 1.1em; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 40px; text-align: center; color: #666; transition: all 0.3s; }
        .upload-area.dragover { background: #f0f8ff; border-color: #4a7eff; }
        #planChart, #roiChart { max-height: 500px; margin: 20px 0; }
        @media (max-width: 768px) { .tabs { flex-direction: column; } .container { margin: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 IB 2027 Adaptive Test-Prep Engine</h1>
            <p>Biology HL • Chemistry HL • Economics HL • Math AA SL • English LL SL • Chinese B SL</p>
        </header>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">1. Diagnose</div>
            <div class="tab" onclick="switchTab(1)">2. Test Analysis</div>
            <div class="tab" onclick="switchTab(2)">3. 90-Day Plan</div>
        </div>

        <div id="tab0" class="tab-content active">
            <div class="form-group">
                <label>Current Predicted Grades (out of 7)</label>
                <div id="sliders"></div>
                <div class="score-display" id="avgScore">Avg: 4.0/7</div>
            </div>
            <button onclick="diagnose()">🚨 DIAGNOSE Next 4 Hours</button>
            <div id="diagnosis"></div>
        </div>

        <div id="tab1" class="tab-content">
            <div class="form-group">
                <label>Subject</label>
                <select id="subjectSelect">
                    <option>Biology HL</option>
                    <option>Chemistry HL</option>
                    <option>Economics HL</option>
                    <option>Math AA SL</option>
                    <option>English LL SL</option>
                    <option>Chinese B SL</option>
                </select>
            </div>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('testFile').click()">
                📄 Drag practice test PDF/image/CSV here or click to upload<br><small>Brutal 100% breakdown in seconds</small>
            </div>
            <input type="file" id="testFile" style="display:none" accept=".pdf,.png,.jpg,.csv,.txt">
            <button onclick="analyzeTest()" style="margin-top:20px">🔍 ANALYZE FOR FULL MARKS</button>
            <div id="testResults"></div>
        </div>

        <div id="tab2" class="tab-content">
            <div class="form-group">
                <label>Plan Horizon <span id="daysDisplay">60</span> days</label>
                <input type="range" id="daysSlider" min="30" max="90" value="60" oninput="updateDays()">
            </div>
            <button onclick="generatePlan()">📅 GENERATE DAY-BY-DAY PLAN</button>
            <div id="planResults"></div>
            <canvas id="planChart"></canvas>
        </div>
    </div>

    <script>
        const SUBJECTS = {
            'Biology HL': {papers: ['P1 MC (30%)','P2 Data/SA (50%)','P3 Essays (20%)'], total_time: 4.5, target: 7},
            'Chemistry HL': {papers: ['P1 MC (20%)','P2 Calc/SA (50%)','P3 Practical (30%)'], total_time: 4.25, target: 7},
            'Economics HL': {papers: ['P1 Data Response (30%)','P2 Essays (40%)','P3 Policy (30%)'], total_time: 4.5, target: 7},
            'Math AA SL': {papers: ['P1 NoCalc (40%)','P2 Calc (40%)','P3 Inquiry (20%)'], total_time: 2.5, target: 6},
            'English LL SL': {papers: ['P1 Guided Text (35%)','P2 Essay (50%)'], total_time: 3.0, target: 6},
            'Chinese B SL': {papers: ['P1 Listening/Reading (50%)','P2 Writing (25%)','Oral (25%)'], total_time: 2.75, target: 6}
        };

        let scores = {};
        let currentScores = {};

        // Initialize sliders
        function initSliders() {
            const slidersDiv = document.getElementById('sliders');
            Object.keys(SUBJECTS).forEach(sub => {
                scores[sub] = 4.0;
                const div = document.createElement('div');
                div.innerHTML = `
                    <label>${sub}</label>
                    <input type="range" min="1" max="7" step="0.1" value="4" 
                           oninput="updateScore('${sub}', this.value); updateAvg()" id="slider-${sub}">
                    <div style="text-align:center;font-weight:bold;color:#667eea" id="score-${sub}">4.0</div>
                `;
                slidersDiv.appendChild(div);
            });
            updateAvg();
        }

        function updateScore(subject, value) {
            scores[subject] = parseFloat(value);
            document.getElementById(`score-${subject}`).textContent = value;
        }

        function updateAvg() {
            const avg = Object.values(scores).reduce((a,b)=>a+parseFloat(b),0) / Object.keys(scores).length;
            document.getElementById('avgScore').textContent = `Avg: ${avg.toFixed(1)}/7`;
            currentScores = {...scores};
        }

        function diagnose() {
            const gaps = {};
            Object.keys(SUBJECTS).forEach(s => gaps[s] = 7 - currentScores[s]);
            
            const priorities = [
                {focus: 'subjects', hours_roi: Object.values(gaps).reduce((a,b)=>a+b,0) * 2},
                {focus: 'timing strategy', hours_roi: Object.values(SUBJECTS).reduce((sum,s) => sum + s.total_time * gaps[s.name||s]/7, 0)},
                {focus: 'pacing under pressure', hours_roi: 1.5 * Object.values(gaps).filter(g=>g>1).length},
                {focus: 'guessing strategy', hours_roi: 0.8 * Object.keys(SUBJECTS).filter(s=>currentScores[s]<4).length}
            ];
            
            const top = priorities.reduce((prev, curr) => curr.hours_roi > prev.hours_roi ? curr : prev);
            
            let html = `
                <div class="metric">${top.focus.toUpperCase()} ← Next 4 Hours Priority</div>
                <table>
                    <tr><th>Focus Area</th><th>ROI (pts/hour)</th><th>Priority</th></tr>
            `;
            priorities.sort((a,b)=>b.hours_roi - a.hours_roi).forEach((p,i) => {
                const cls = i===0 ? 'roi-high' : i===1 ? 'roi-low' : '';
                html += `<tr class="${cls}"><td>${p.focus}</td><td>${p.hours_roi.toFixed(1)}</td><td>${i+1}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('diagnosis').innerHTML = html;
        }

        // Brutal full-marks fixes
        const FULL_MARKS_FIXES = {
            'Biology HL': {
                'P1': 'Memorize 30 command terms. PoE eliminates 2 options always. Never guess 1st instinct.',
                'P2': 'Data: Calculate %change, SD, perfect sketch graphs (label axes/units).',
                'P3': 'Essays: Claim-Evidence-Link ×3. Cite 5+ studies verbatim. 20min planning.'
            },
            'Chemistry HL': {
                'P1': '20% tricky equilibria MC. Guess C if tied. Sig figs EVERYWHERE.',
                'P2': 'Balance eqns 1st. Rates: Arrhenius equation always. Units consistent.',
                'P3': '%error = (smallest reading/total)×100. Perfect calibration curves.'
            },
            'Economics HL': {
                'P1': 'AD/AS: 4-step diagrams (label eP/Q). Extract 3 data points.',
                'P2': 'Essays: 2× evaluation chains (S/L-term, stakeholders).',
                'P3': 'HL Policy matrix: 3 criteria each. Always "depends on magnitude".'
            }
            // Add others similarly...
        };

        function analyzeTest() {
            const file = document.getElementById('testFile').files[0];
            if (!file) return alert('Upload a practice test first!');
            
            const subject = document.getElementById('subjectSelect').value;
            const fixes = FULL_MARKS_FIXES[subject] || {};
            
            let html = '<h3>🎯 Exact Fixes to 100% Marks</h3>';
            Object.keys(fixes).forEach(paper => {
                html += `<div class="error">**${paper}:** ${fixes[paper]}</div>`;
            });
            html += '<p><em>💡 Drill 10 past papers today. Time yourself -10%. Upload real results for precise error analysis.</em></p>';
            
            document.getElementById('testResults').innerHTML = html;
        }

        function generatePlan() {
            const days = parseInt(document.getElementById('daysSlider').value);
            let plan = [];
            let projScores = {...currentScores};
            
            for(let day=0; day<days; day++) {
                const isSchoolDay = day % 7 < 5;
                const blocks = isSchoolDay ? 4 : 2.8;
                const roi_mult = isSchoolDay ? 1.2 : 0.8;
                
                // Find weakest subject
                const weakSub = Object.keys(projScores).reduce((a,b) => projScores[a] < projScores[b] ? a : b);
                const proj_gain = Math.min(0.1 * blocks * roi_mult, 7 - projScores[weakSub]);
                projScores[weakSub] = Math.min(7, projScores[weakSub] + proj_gain);
                
                plan.push({
                    day,
                    date: `Mar ${17+day}`,
                    focus: `${weakSub}`,
                    blocks,
                    roi: roi_mult * proj_gain * 10,
                    scores: {...projScores}
                });
            }
            
            let html = `<table><tr><th>Day</th><th>Date</th><th>4-Hour Block</th><th>ROI</th><th>Proj Scores</th></tr>`;
            plan.slice(0,15).forEach(p => {  // Show first 15 days
                html += `<tr><td>${p.day+1}</td><td>${p.date}</td><td>${p.focus}</td><td>${p.roi.toFixed(1)}</td><td>${Object.values(p.scores).map(s=>s.toFixed(1)).join('/')}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('planResults').innerHTML = html;
            drawPlanChart(plan);
        }

        function drawPlanChart(plan) {
            const ctx = document.getElementById('planChart');
            ctx.innerHTML = '';
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: plan.map(p=>`Day ${p.day+1}`),
                    datasets: Object.keys(SUBJECTS).map((sub,i) => ({
                        label: sub,
                        data: plan.map(p=>p.scores[sub]),
                        borderColor: `hsl(${i*60},70%,50%)`,
                        fill: false,
                        tension: 0.4
                    }))
                },
                options: {
                    responsive: true,
                    scales: { y: { min: 1, max: 7, title: { display: true, text: 'Predicted Grade /7' } } }
                }
            });
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', i===n));
            document.querySelectorAll('.tab-content').forEach((t,i)=>t.classList.toggle('active', i===n));
        }

        function updateDays() {
            document.getElementById('daysDisplay').textContent = document.getElementById('daysSlider').value;
        }

        // Drag & drop
        const uploadArea = document.getElementById('uploadArea');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            uploadArea.addEventListener(event, e => {
                e.preventDefault();
                e.currentTarget.classList.toggle('dragover', event==='dragenter' || event==='dragover');
            });
        });
        document.getElementById('testFile').addEventListener('change', e => {
            document.getElementById('uploadArea').textContent = `✅ ${e.target.files[0].name} loaded`;
        });

        // Init
        initSliders();
    </script>
</body>
</html>
